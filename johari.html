<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Johari Terrace</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Spline+Sans+Mono:wght@400;500&display=swap');
  :root{
    --paper:#f3ead8; --ink:#23201b; --ink-soft:#6b6354;
    --open:#3f7d6e; --hidden:#c8843c; --blind:#9a5b7e; --unknown:#4a5470;
    --idea:#2f6d5f; --release:#b8442e; --fog:#1a1815; --labball:#cf7d34;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--paper);color:var(--ink);font-family:'Spline Sans Mono',monospace;overflow:hidden}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:5;opacity:.05;
    background-image:radial-gradient(var(--ink) .5px,transparent .5px);background-size:4px 4px}
  canvas{display:block;position:fixed;inset:0;touch-action:none}
  .hud{position:fixed;left:clamp(16px,3vw,40px);top:clamp(16px,3vw,40px);z-index:10;pointer-events:none}
  .hud h1{font-family:'Fraunces',serif;font-weight:900;font-size:clamp(20px,2.6vw,34px);letter-spacing:-.02em;line-height:.95}
  .hud p{font-size:clamp(10px,1vw,12.5px);color:var(--ink-soft);margin-top:6px;max-width:36ch;line-height:1.5;min-height:3em}
  .controls{position:fixed;bottom:clamp(16px,3vw,36px);left:0;right:0;z-index:10;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:0 16px;align-items:center}
  button{font-family:'Spline Sans Mono',monospace;font-size:18px;line-height:1;color:var(--ink);background:var(--paper);
    border:1.5px solid var(--ink);width:46px;height:46px;display:flex;align-items:center;justify-content:center;
    border-radius:2px;cursor:pointer;box-shadow:3px 3px 0 var(--ink);transition:transform .08s,box-shadow .08s;padding:0}
  button:hover{transform:translate(1px,1px);box-shadow:2px 2px 0 var(--ink)}
  button:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--ink)}
  button.alt.on{background:var(--open);filter:saturate(1.4)}
  .dots{display:flex;gap:9px;align-items:center;align-self:center;min-width:9ch;justify-content:center}
  .dots i{width:9px;height:9px;border-radius:50%;background:var(--ink);opacity:.18;transition:opacity .3s,transform .3s}
  .dots i.on{opacity:.9;transform:scale(1.25)}
  .tip{position:fixed;bottom:clamp(74px,11vw,104px);left:0;right:0;z-index:10;text-align:center;font-size:12px;color:var(--ink-soft);pointer-events:none}
  .tip[hidden]{display:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="tip" id="tip" hidden><b>→ / space</b> next &nbsp;·&nbsp; <b>←</b> back &nbsp;·&nbsp; <b>f</b> free play (click drops · hold lifts)</div>
<div class="controls">
  <button id="back" title="back">◀</button>
  <span id="dots" class="dots"></span>
  <button id="next" title="next">▶</button>
  <button id="restart" title="restart">↺</button>
  <button class="alt" id="freeplay" title="free play">🎮</button>
  <button id="help" title="help">?</button>
</div>

<script>
const cv=document.getElementById('c'); const ctx=cv.getContext('2d'); let W,H,DPR;

// ===== world =====
// xz floor. x: west(-)..east(+).  z: NORTH(-)..SOUTH(+).
// Layout (north at top/back, south at front/bottom):
//   NORTH row (z<0): unknown-to-self column. UNKNOWN (north), highest.
//   SOUTH row (z>0): known-to-self.          OPEN (south/arena), lowest.
// We want: UNKNOWN north & high, OPEN south & low. Hidden/Blind mid.
const GRID=2.0;
const STEP=GRID*0.42;
// base heights: unknown highest -> blind/hidden mid -> open lowest
const CELLS={
  unknown:{minx:-GRID,maxx:0, minz:-GRID,maxz:0, base:STEP*2, label:'UNKNOWN', sub:'unknown to self · unknown to others', fogged:true,  color:'--unknown'},
  blind:  {minx:0,maxx:GRID,  minz:-GRID,maxz:0, base:STEP,   label:'BLIND',   sub:'unknown to self · known to others',   fogged:true,  color:'--blind'},
  hidden: {minx:-GRID,maxx:0, minz:0,maxz:GRID,  base:STEP,   label:'HIDDEN',  sub:'known to self · unknown to others',   fogged:false, color:'--hidden'},
  open:   {minx:0,maxx:GRID,  minz:0,maxz:GRID,  base:0,      label:'OPEN',    sub:'known to self · known to others',     fogged:false, color:'--open'}
};
function cellKey(cell){for(const k in CELLS) if(CELLS[k]===cell) return k; return null;}
function centerOf(key){const c=CELLS[key];return {x:(c.minx+c.maxx)/2, z:(c.minz+c.maxz)/2};}

// ===== parametric camera: pitch 0 = flat head-on diagram, 1 = iso terrace =====
let pitch=0, pitchTarget=0;
const ISO=Math.PI/6;
function project(x,y,z){
  const t=pitch;
  const ang=ISO*t;
  const ca=Math.cos(ang), sa=Math.sin(ang);
  // Flat (t=0): X=x, Y=z  (plan view, north up). Height unused.
  // Iso  (t=1): X=(x - z)*cos30 ; Y=(x + z)*sin30 - height
  const Xflat=x,            Yflat=z;
  const Xiso=(x - z)*Math.cos(ISO), Yiso=(x + z)*Math.sin(ISO) - y;
  const X = Xflat*(1-t) + Xiso*t;
  const Y = Yflat*(1-t) + Yiso*t;
  return {X:ox+X*scale, Y:oy+Y*scale};
}
let scale=1, ox=0, oy=0;
function layout(){
  DPR=devicePixelRatio||1;
  W=cv.width=innerWidth*DPR; H=cv.height=innerHeight*DPR;
  cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px';
  computeScale();
}
function computeScale(){
  // flat view spans ~GRID*2.5 ; iso zoomed in tighter for full-bleed on the front cells
  const span = (1-pitch)*(GRID*2.5) + pitch*(GRID*3.1);
  scale=Math.min(W/span, H/span);
  ox=W/2;
  // flat: centred. iso: shift the world up the screen so Hidden/Open/Blind fill the frame
  oy=H*(0.5 - 0.16*pitch);
}
function cssVar(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}
function hexA(v,a){const h=cssVar(v);return `rgba(${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)},${a})`;}

// ===== deform: WEIGHT-ONLY. Mass in a cell sinks its fabric into a well. =====
const cellMass={open:0,hidden:0,blind:0,unknown:0};   // accumulated weight
const amp={open:0,hidden:0,blind:0,unknown:0};        // animated well depth (negative=sunk)
const fill={open:0,hidden:0,blind:0,unknown:0};       // rising fill height inside the basin
const SIG=GRID*0.42;
const DEPTH_PER_MASS=GRID*0.075;   // how much each unit of mass deepens the well
const MAX_DEPTH=GRID*1.1;
const MASS_ORIGINAL=1, MASS_LAB=1.8; // lab ideas are heavier
const releaseWell={unknown:0};
const lift={open:0,hidden:0,blind:0,unknown:0};       // long-press peak (free play): positive = up
const liftTarget={open:0,hidden:0,blind:0,unknown:0};
const LIFT_MAX=GRID*0.7;
// ===== intro build state =====
const cellAlpha={unknown:0,blind:0,open:0,hidden:0};   // per-cell fade-in
const cellAlphaT={unknown:0,blind:0,open:0,hidden:0};  // targets
let bg=0, bgT=0;             // 0 = black screen, 1 = paper
let unkMix=0, unkMixT=0;     // Unknown colour: 0 = ink/black, 1 = --unknown
let axisA=0, axisT=0;        // axis-label fade
function hx(v){const h=cssVar(v);return {r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function mix(a,b,t){return {r:Math.round(a.r+(b.r-a.r)*t),g:Math.round(a.g+(b.g-a.g)*t),b:Math.round(a.b+(b.b-a.b)*t)};}
function rgba(c,a){return `rgba(${c.r},${c.g},${c.b},${a})`;}
function cellAmp(key){let a=amp[key]+lift[key]; if(key==='unknown') a+=releaseWell.unknown; return a;}
function fabricY(cell,x,z){
  let h=cell.base*pitch;             // terrace only rises as we tilt into iso
  const a=cellAmp(cellKey(cell))*pitch;  // a<=0 -> dips into a well
  if(Math.abs(a)>0.001){
    const cx=(cell.minx+cell.maxx)/2, cz=(cell.minz+cell.maxz)/2;
    const r2=(x-cx)*(x-cx)+(z-cz)*(z-cz);
    h+=a*Math.exp(-r2/(2*SIG*SIG));
  }
  return h;
}
// the fill surface height at a cell centre (sits above the well floor as mass piles in)
function fillSurfaceY(cell){
  const cx=(cell.minx+cell.maxx)/2, cz=(cell.minz+cell.maxz)/2;
  const floor=fabricY(cell,cx,cz);             // bottom of the basin
  return floor + fill[cellKey(cell)]*pitch;    // fill rises from the floor
}

// ===== fog of war (north / unknown-to-self cells: unknown + blind) =====
const FOG_N=40; const fog=[];
function initFog(){fog.length=0;for(let i=0;i<FOG_N;i++){fog.push([]);for(let j=0;j<FOG_N;j++)fog[i].push(1);}}
// fog grid spans the NORTH row z:-GRID..0, full x:-GRID..GRID
function fogIdx(x,z){const i=Math.floor(((x+GRID)/(2*GRID))*FOG_N); const j=Math.floor(((z+GRID)/GRID)*FOG_N); return {i,j};}
function clearFogAt(x,z,rad){
  if(z>=0) return;                       // only north row is fogged
  const {i,j}=fogIdx(x,z); const rr=Math.ceil(rad/((2*GRID)/FOG_N));
  for(let di=-rr;di<=rr;di++)for(let dj=-rr;dj<=rr;dj++){const ii=i+di,jj=j+dj;
    if(ii<0||jj<0||ii>=FOG_N||jj>=FOG_N)continue;
    if(di*di+dj*dj<=rr*rr) fog[ii][jj]=Math.min(fog[ii][jj],0.1);}
}
function refog(){for(let i=0;i<FOG_N;i++)for(let j=0;j<FOG_N;j++)fog[i][j]=1;}
function fogAt(x,z){ if(z>=0) return 0; const {i,j}=fogIdx(x,z);
  if(i<0||j<0||i>=FOG_N||j>=FOG_N) return 0; return fog[i][j]; }

// ===== ideas: 4 tracked balls, each with an origin and a visibility flag =====
let ballR;
const ideas=[]; const releases=[]; const labBalls=[];
function jit(key,dx,dz){const c=centerOf(key);return {x:c.x+dx,z:c.z+dz};}
function makeIdeas(){
  ideas.length=0;
  // 6 originals, alternating blind/hidden, each with a small spawn delay so they flow in
  const seq=['blind','hidden','blind','hidden','blind','hidden'];
  seq.forEach((origin,i)=>{
    const p=jit(origin, (i%2?-0.2:0.2)+ (Math.random()-0.5)*0.2, (origin==='blind'?-0.1:0.1)+(Math.random()-0.5)*0.2);
    ideas.push({x:p.x,z:p.z,tx:p.x,tz:p.z,origin,shown:false,delay:0,counted:false});
  });
}
function arenaSlot(i){ // loose cluster near the arena centre (the bottom of the well)
  const c=CELLS.open, cx=(c.minx+c.maxx)/2, cz=(c.minz+c.maxz)/2;
  const ang=(i/6)*Math.PI*2+0.4, r=GRID*0.12;
  return {x:cx+Math.cos(ang)*r, z:cz+Math.sin(ang)*r};
}
function dropRelease(){releases.push({x:centerOf('unknown').x,z:centerOf('unknown').z,y:GRID*2.4,vy:0,landed:false});}

// ===== lab emitter: streams jittered, differently-coloured balls that flood the arena =====
const lab={active:false, t:0, next:0, emitted:0, max:18};
function startLab(){ lab.active=true; lab.t=0; lab.next=0; lab.emitted=0; labBalls.length=0; }
function stopLab(){ lab.active=false; }
function floodFill(){ while(lab.emitted<lab.max) emitLab(); lab.active=false; }   // guarantee full volume regardless of when we snap
function emitLab(){
  // born at unknown (north/high), targets a slot piled on top of the arena originals
  const u=centerOf('unknown');
  const oi=lab.emitted % 6;
  const base=arenaSlot(oi);
  const tx=base.x+(Math.random()-0.5)*0.5, tz=base.z+(Math.random()-0.5)*0.5;
  labBalls.push({x:u.x+(Math.random()-0.5)*0.6, z:u.z+(Math.random()-0.5)*0.6, tx, tz,
                 stack:0.06*Math.floor(lab.emitted/6), counted:false}); // later balls ride higher = bury
  lab.emitted++;
}

// ===== snap: terrace shatters, balls fall into an xy bell-curve histogram =====
let snapping=false, snapProg=0;
// ===== climb: first-person ascent of the bell-curve slope from the left tail =====
let climbing=false, climbStep=0, climbProgC=0, stamina=1, wound=0, shakeImp=0, climbIntro=0;
let CLIMB_MAX=8, roll=0, rollTarget=0, climbCols=null, climbMode=0;
function onClimbStep(){ shakeImp=Math.min(1, shakeImp+0.65); rollTarget=(climbStep%2? 1:-1)*0.10; }
// build the bell as columns of balls: originals (teal) in the tails, lab balls (orange) in the centre
function buildClimb(){
  const origs=(ideas.filter(b=>b.shown).length)||6, labs=labBalls.length;
  const N=origs+labs||1;
  const B=Math.min(11,Math.max(7,Math.round(Math.sqrt(N)*2)+1));
  const counts=gaussianCounts(N,B), c=(B-1)/2;
  const slots=[]; for(let b=0;b<B;b++) for(let s=0;s<counts[b];s++) slots.push({b,s});
  slots.sort((p,q)=>(Math.abs(q.b-c)-Math.abs(p.b-c))||(p.s-q.s)); // tails first
  const colors=Array.from({length:B},()=>[]);
  for(let i=0;i<slots.length;i++) colors[slots[i].b].push(i<origs?'--idea':'--labball');
  for(const col of colors) col.sort((a,b)=>a==='--idea'?-1:1); // teal seated below orange in each column
  climbCols={B,counts,colors};
  climbMode=counts.indexOf(Math.max(...counts));
  CLIMB_MAX=Math.max(2, climbMode-1);   // one step per left-flank bucket, stop just below the peak
  // additive orange balls that later pile onto the RIGHT flank, filling the right edge (exponential)
  const add=counts.map((_,b)=> b>climbMode ? Math.round((b-climbMode)*2.4) : 0);
  const pile=[]; for(let b=0;b<B;b++) for(let s=0;s<add[b];s++) pile.push({b,s});
  pile.sort((p,q)=>(p.s-q.s)||(p.b-q.b));     // fill low layers first across columns -> looks like piling
  climbCols.add=add; climbCols.pile=pile;
  // green code-review balls: the first lands centre (peer's casual one), the rest flood across columns
  const green=[], gc=new Array(B).fill(0);
  const pushGreen=(b)=>{ green.push({b, lvl:counts[b]+add[b]+gc[b]}); gc[b]++; };
  pushGreen(climbMode);                        // peer's single ball, on top at centre
  for(let i=1;i<22;i++) pushGreen(i%B);        // the 2,000-line flood, spread everywhere
  climbCols.green=green;
}
// ===== RPG dialogue overlaid on the held idle-duress climb (review / reply / exit / devastation) =====
let dlg='', reviewIdx=0, reviewPhase=0, streamC=0, streamDone=false, panic=0, panicT=0, flash=0;
let confetti=[];                              // positive-review celebration burst
function fireConfetti(){
  const cols=['--open','--idea','--labball','--hidden','--paper'];
  for(let i=0;i<80;i++){ const a=-Math.PI/2+(Math.random()-0.5)*1.7, sp=(7+Math.random()*12)*DPR;
    confetti.push({x:W*0.5+(Math.random()-0.5)*W*0.5, y:H*0.16+(Math.random()-0.5)*H*0.04,
      vx:Math.cos(a)*sp*0.5+(Math.random()-0.5)*5*DPR, vy:Math.sin(a)*sp-3*DPR,
      rot:Math.random()*6.28, vr:(Math.random()-0.5)*0.5, col:cols[i%cols.length],
      w:(5+Math.random()*7)*DPR, h:(8+Math.random()*9)*DPR, life:1}); }
}
function drawConfetti(){
  for(const c of confetti){ ctx.save(); ctx.globalAlpha=Math.max(0,Math.min(1,c.life*1.4));
    ctx.translate(c.x,c.y); ctx.rotate(c.rot);
    ctx.fillStyle=cssVar(c.col); ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);
    ctx.strokeStyle=hexA('--ink',0.25); ctx.lineWidth=1; ctx.strokeRect(-c.w/2,-c.h/2,c.w,c.h);
    ctx.restore(); }
}
let boxSlide=0, boxSlideT=0;                 // exit: dialogue box slides off-screen
let pileProg=0, pileT=0, zoomOut=0, zoomT=0; // aftermath: additive right-side balls, then zoom out
let fadeK=0, fadeKT=0, crisis=0, crisisT=0;
let mgrExit=0, mgrExitT=0;                    // devast: visual cue of the manager leaving
let glassK=0, glassKT=0;                      // crisis: glass CRACKS spread (no static yet)
let greenShown=0, greenShownT=0;              // peer review: green balls revealed (1, then a flood)
let staticMotion=1, staticMotionT=1, staticAcc=0;   // how fast the snow churns; eases to 0 = frozen
let clearProg=0, clearProgT=0;                // breathing: white radius that clears the static
let breathT=0, breathPhase='', breathLabel='', breathPulse=0;  // the grounding exercise timeline
let glass=[];                                 // crisis: broken-glass shards
let glassFall=[];                             // crisis: detached shards that fall away
let breathLocal=0;                            // 0..1 progress within the current breath phase (pacer arc)
let pacerA=1, pacerAT=1;                       // pacer circle fades out on "there you are"
let whiteEnd=false;                            // final beat: pure white, no controls
const lerp=(a,b,t)=>a+(b-a)*t;
// B&W TV static, masked into broken-glass shards so the scene shows through the intact panes
const noiseCv=document.createElement('canvas'); noiseCv.width=220; noiseCv.height=150;
const noiseCtx=noiseCv.getContext('2d');
function regenNoise(){ const id=noiseCtx.createImageData(noiseCv.width,noiseCv.height), d=id.data;
  for(let i=0;i<d.length;i+=4){ const v=Math.random()*255|0; d[i]=d[i+1]=d[i+2]=v; d[i+3]=255; } noiseCtx.putImageData(id,0,0); }
function blitStatic(alpha){ ctx.save(); ctx.globalAlpha=alpha; ctx.imageSmoothingEnabled=false; ctx.drawImage(noiseCv,0,0,W,H); ctx.restore(); }
function buildGlass(){ glass=[]; const cx=W*(0.42+Math.random()*0.16), cy=H*0.34, N=11, angs=[];
  for(let i=0;i<N;i++) angs.push((i/N)*Math.PI*2 + (Math.random()-0.5)*0.35); angs.sort((a,b)=>a-b);
  const R=Math.hypot(W,H), P=(a,r)=>({x:cx+Math.cos(a)*r, y:cy+Math.sin(a)*r});
  for(let i=0;i<N;i++){ const a0=angs[i], a1=(i+1<N?angs[i+1]:angs[0]+Math.PI*2);
    const r1=R*(0.30+Math.random()*0.22);
    glass.push({pts:[{x:cx,y:cy},P(a0,r1),P(a1,r1)], o:Math.random()*0.45});
    glass.push({pts:[P(a0,r1),P(a1,r1),P(a1,R),P(a0,R)], o:0.3+Math.random()*0.65}); } }
function shardPath(sh){ ctx.beginPath(); ctx.moveTo(sh.pts[0].x,sh.pts[0].y);
  for(let i=1;i<sh.pts.length;i++) ctx.lineTo(sh.pts[i].x,sh.pts[i].y); ctx.closePath(); }
function drawGlass(crack, fill){
  if(!glass.length) buildGlass();
  if(fill>0.01){ staticAcc+=staticMotion; if(staticAcc>=1){ staticAcc-=1; regenNoise(); }  // churn slows + freezes as staticMotion->0
    for(const sh of glass){ if(fill<=sh.o) continue;
      ctx.save(); shardPath(sh); ctx.clip(); ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(0,0,W,H); blitStatic(0.85); ctx.restore(); } }
  if(crack>0.01){ ctx.lineJoin='round'; ctx.lineCap='round';   // cracks: dark gap under a bright glint = legible on any background
    for(const sh of glass){ if(crack<=sh.o) continue; const a=Math.min(1,(crack-sh.o)/0.2);
      shardPath(sh); ctx.strokeStyle=`rgba(12,11,9,${0.6*a})`;   ctx.lineWidth=Math.max(3,scale*0.0075); ctx.stroke();   // dark fracture gap
      shardPath(sh); ctx.strokeStyle=`rgba(250,250,247,${0.92*a})`; ctx.lineWidth=Math.max(1.5,scale*0.0034); ctx.stroke(); } // bright edge
    ctx.lineJoin='miter'; ctx.lineCap='butt'; }
}
// detached shards that fall away as the glass shatters
function spawnGlassFall(n){
  for(let i=0;i<n;i++){ const s=(16+Math.random()*40)*DPR, k=3+(Math.random()<0.5?0:1), pts=[];
    for(let j=0;j<k;j++){ const a=(j/k)*6.28+Math.random()*0.7, rr2=s*(0.5+Math.random()*0.7); pts.push({x:Math.cos(a)*rr2,y:Math.sin(a)*rr2}); }
    glassFall.push({x:W*(0.18+Math.random()*0.64), y:H*(0.08+Math.random()*0.34), pts,
      vx:(Math.random()-0.5)*3*DPR, vy:(0.5+Math.random()*2)*DPR, rot:Math.random()*6.28, vr:(Math.random()-0.5)*0.16, life:1}); }
}
function drawGlassFall(){
  for(const g of glassFall){ ctx.save(); ctx.globalAlpha=Math.max(0,Math.min(0.92,g.life)); ctx.translate(g.x,g.y); ctx.rotate(g.rot);
    ctx.beginPath(); ctx.moveTo(g.pts[0].x,g.pts[0].y); for(let i=1;i<g.pts.length;i++) ctx.lineTo(g.pts[i].x,g.pts[i].y); ctx.closePath();
    ctx.fillStyle='rgba(216,224,228,0.16)'; ctx.fill();
    ctx.lineWidth=Math.max(2,scale*0.0045); ctx.strokeStyle='rgba(250,252,250,0.9)'; ctx.stroke();   // bright glint edge
    ctx.lineWidth=Math.max(1,scale*0.002); ctx.strokeStyle='rgba(12,11,9,0.45)'; ctx.stroke();        // dark inner edge
    ctx.restore(); }
}
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
// breathing pacer: a circle that expands on inhale / contracts on exhale, with a number-less sweep arc forecasting the phase end
function drawBreathPacer(){
  if(pacerA<0.01) return;
  ctx.save(); ctx.globalAlpha=pacerA;

function gaussianCounts(N,B){

  let oi=0; while(diff>0){ counts[order[oi%B]]++; diff--; oi++; }

}

    roll += (rollTarget-roll)*0.12;

    boxSlide += (boxSlideT-boxSlide)*0.12;          // exit: slide the box away
    pileProg += (pileT-pileProg)*0.05;              // additive right-side balls (visible rain)
    zoomOut += (zoomT-zoomOut)*0.045;               // pull camera back to the overview
    crisis += (crisisT-crisis)*0.05;                // static fills the cracked glass
    glassK += (glassKT-glassK)*0.05;                // cracks spread first
    greenShown += (greenShownT-greenShown)*0.08;    // peer's green balls arrive (1, then a flood)
    mgrExit += (mgrExitT-mgrExit)*0.06;             // devast: the manager leaves
    staticMotion += (staticMotionT-staticMotion)*0.02;   // the snow slows to a stop
    clearProg += (clearProgT-clearProg)*0.05;            // breathing: white clears the static
    fadeK += (fadeKT-fadeK)*0.03;
    if(dlg==='breathe'){                            // one round, 3-3-3, clearing to white
      breathT++;
      const IN=180, HOLD=180, OUT=180, CYC=IN+HOLD+OUT;   // ~3s in · 3s hold · 3s out (at 60fps)
      const t=Math.min(breathT, CYC);
      let phase, localT;
      if(t<IN){ phase='in'; localT=t/IN; }
      else if(t<IN+HOLD){ phase='hold'; localT=(t-IN)/HOLD; }
      else if(t<CYC){ phase='out'; localT=(t-IN-HOLD)/OUT; }

      breathPulse = phase==='in'?localT : phase==='hold'?1 : phase==='out'?1-localT : 0;
      breathLocal = localT;
      const done = breathT>=CYC;
      clearProgT = Math.min(1, breathT/CYC);          // one breath washes the field to white

function drawCellTop(cell){

    const z0=cell.minz+(j/N)*(cell.maxz-cell.minz),z1=cell.minz+((j+1)/N)*(cell.maxz-cell.minz);

          p2=project(x1,fabricY(cell,x1,z1),z1),p3=project(x0,fabricY(cell,x0,z1),z1);
    const hAvg=(fabricY(cell,x0,z0)+fabricY(cell,x1,z1))/2 - cell.base*pitch;

    for(let j=0;j<=N;j++){const z=cell.minz+(j/N)*(cell.maxz-cell.minz);const p=project(x,fabricY(cell,x,z),z);j?ctx.lineTo(p.X,p.Y):ctx.moveTo(p.X,p.Y);}ctx.stroke();}
  for(let j=0;j<=N;j++){const z=cell.minz+(j/N)*(cell.maxz-cell.minz);ctx.beginPath();

}

  const p=project(x,y,z), s=project(x,fabricY(cell,x,z),z);   // shadow sits on the deformed floor beneath the ball

  ctx.beginPath();ctx.ellipse(s.X,s.Y,r*scale*0.9,r*scale*0.42*(0.4+0.6*pitch),0,0,Math.PI*2);ctx.fillStyle=hexA('--ink',0.16);ctx.fill();
  ctx.beginPath();ctx.arc(p.X,p.Y,r*scale,0,Math.PI*2);ctx.fillStyle=cssVar(fillVar);ctx.fill();
  ctx.lineWidth=Math.max(1.5,scale*0.006);ctx.strokeStyle=cssVar('--ink');ctx.stroke();
  ctx.beginPath();ctx.arc(p.X-r*scale*0.3,p.Y-r*scale*0.3,r*scale*0.28,0,Math.PI*2);ctx.fillStyle=hexA('--paper',0.7);ctx.fill();

  ctx.globalAlpha=1;
}

function drawAxes(){
  const a=axisA*(1-pitch); if(a<0.02) return;
  ctx.save(); ctx.globalAlpha=a;
  ctx.fillStyle=cssVar('--ink'); ctx.textAlign='center';
  ctx.font=`500 ${Math.round(scale*0.07)}px 'Spline Sans Mono',monospace`;
  // Orientation: north=unknown-to-self, south=known-to-self, west=unknown-to-others, east=known-to-others.
  ctx.fillText('unknown to self', project(0,0,-GRID).X, project(0,0,-GRID).Y - scale*0.16);
  // bottom label clamped so the control bar never covers it
  const bottomY=Math.min(project(0,0,GRID).Y + scale*0.18, H - 130*DPR);
  ctx.fillText('known to self', project(0,0,GRID).X, bottomY);
  ctx.save(); ctx.translate(project(-GRID,0,0).X - scale*0.20, project(-GRID,0,0).Y);
  ctx.rotate(-Math.PI/2); ctx.fillText('unknown to others',0,0); ctx.restore();
  ctx.save(); ctx.translate(project(GRID,0,0).X + scale*0.20, project(GRID,0,0).Y);
  ctx.rotate(-Math.PI/2); ctx.fillText('known to others',0,0); ctx.restore();
  ctx.restore();
}

function draw(){
  computeScale();
  ctx.clearRect(0,0,W,H);
  if(whiteEnd){ ctx.fillStyle='rgb(248,246,240)'; ctx.fillRect(0,0,W,H); return; }   // final: just white
  if(bg<0.999){ ctx.fillStyle=`rgba(0,0,0,${1-bg})`; ctx.fillRect(0,0,W,H); }  // black screen, fades to paper
  if(climbing){ drawClimb(); if(dlg) drawDlg(); fadeOverlay(); return; }
  if(snapping){ drawSnap(); fadeOverlay(); return; }
  const ink=cssVar('--ink'), lw=Math.max(2,scale*0.006);
  // draw order: farthest cell (most negative x+z, i.e. north-west) first
  const order=['unknown','blind','hidden','open'];
  for(const k of order){
    const c=CELLS[k];
    if(pitch>0.02 && c.base>0 && cellAlpha[k]>0.5){
      drawRiser(c.minx,c.maxz,c.maxx,c.maxz, fabricY(c,c.minx,c.maxz), fabricY(c,c.maxx,c.maxz), c.color); // south face
      drawRiser(c.maxx,c.maxz,c.maxx,c.minz, fabricY(c,c.maxx,c.maxz), fabricY(c,c.maxx,c.minz), c.color); // east face
    }
    drawCellTop(c);
  }
  // crisp outline of each cell footprint
  ctx.lineWidth=lw;
  for(const k in CELLS){const c=CELLS[k]; const ca=cellAlpha[k]; if(ca<=0.01) continue;
    const oc = k==='unknown' ? mix(hx('--ink'),hx('--unknown'),unkMix) : hx(c.color);
    const a=project(c.minx,fabricY(c,c.minx,c.minz),c.minz),b=project(c.maxx,fabricY(c,c.maxx,c.minz),c.minz),
          d=project(c.maxx,fabricY(c,c.maxx,c.maxz),c.maxz),e=project(c.minx,fabricY(c,c.minx,c.maxz),c.maxz);
    quad(a,b,d,e,null,rgba(oc,0.55*ca),lw*0.6);
  }
  drawAxes();
  // labels
  for(const k in CELLS){const c=CELLS[k];const cx=(c.minx+c.maxx)/2,cz=(c.minz+c.maxz)/2;
    const ca=cellAlpha[k]; if(ca<=0.01) continue;
    let fogged=0; if(cz<0 && pitch>=0.04){const {i,j}=fogIdx(cx,cz);fogged=fog[Math.min(FOG_N-1,Math.max(0,i))][Math.min(FOG_N-1,Math.max(0,j))];}
    const p=project(cx,fabricY(c,cx,cz)+GRID*0.1,cz);
    ctx.textAlign='center';
    const lblCol = k==='unknown' ? mix(hx('--ink'),hx('--unknown'),unkMix) : hx(c.color);
    ctx.fillStyle=fogged>0.4?hexA('--paper',0.5*ca):rgba(lblCol,ca);
    ctx.font=`900 ${Math.round(scale*0.11)}px 'Fraunces',serif`;ctx.fillText(c.label,p.X,p.Y);
    if(fogged<=0.4){ctx.fillStyle=rgba(hx('--ink-soft'),ca);ctx.font=`400 ${Math.round(scale*0.038)}px 'Spline Sans Mono',monospace`;ctx.fillText(c.sub,p.X,p.Y+scale*0.065);}
  }
  // balls — settle into the basin; submerged ones dim as fill rises over them
  const drawn=[];
  for(const b of ideas){
    if(!b.shown) continue;
    if(fogAt(b.x,b.z)>0.4) continue;
    const k=cellAt(b.x,b.z), cell=CELLS[k];
    const y=fabricY(cell,b.x,b.z)+ballR;       // rest on the (sunken) floor
    const submerged = fillSurfaceY(cell) > y + ballR*0.5;
    drawn.push({x:b.x,y,z:b.z,r:ballR,fill:'--idea',heavy:false,dim:submerged,d:b.z*2+b.x});
  }
  for(const b of labBalls){
    if(fogAt(b.x,b.z)>0.4) continue;
    const k=cellAt(b.x,b.z), cell=CELLS[k];
    const y=fabricY(cell,b.x,b.z)+ballR+(b.stack||0);
    drawn.push({x:b.x,y,z:b.z,r:ballR*0.92,fill:'--labball',heavy:false,dim:false,d:b.z*2+b.x+1.0+(b.stack||0)});
  }
  for(const b of releases) drawn.push({x:b.x,y:b.y+ballR*1.6,z:b.z,r:ballR*1.7,fill:'--release',heavy:true,dim:false,d:b.z*2+b.x+0.001});
  drawn.sort((a,b)=>a.d-b.d);
  for(const o of drawn) drawBall(o.x,o.y,o.z,o.r,o.fill,o.heavy,o.dim);
  // fog drawn LAST so it fully occludes anything beneath it
  drawFog();
}
function ballAt(X,Y,r,fillVar,a){
  ctx.globalAlpha=a;
  ctx.beginPath();ctx.arc(X,Y,r,0,Math.PI*2);ctx.fillStyle=cssVar(fillVar);ctx.fill();
  ctx.lineWidth=Math.max(1.5,scale*0.006);ctx.strokeStyle=cssVar('--ink');ctx.stroke();
  ctx.beginPath();ctx.arc(X-r*0.3,Y-r*0.3,r*0.28,0,Math.PI*2);ctx.fillStyle=hexA('--paper',0.7);ctx.fill();
  ctx.globalAlpha=1;
}
function drawSnap(){
  // 0. crack splits the Open arena first (brief flash, fades as the terrace lifts)
  const crackA=Math.max(0,1-snapProg*5);
  if(crackA>0.02){
    const o=CELLS.open;
    ctx.strokeStyle=hexA('--ink',0.85*crackA); ctx.lineWidth=Math.max(1.5,scale*0.006);
    for(let n=0;n<3;n++){
      ctx.beginPath();
      for(let t=0;t<=1.0001;t+=0.2){
        const x=o.minx+t*(o.maxx-o.minx);
        const z=(o.minz+o.maxz)/2 + (n-1)*0.5 + (Math.sin(t*9+n)*0.18);
        const p=project(x,fabricY(o,x,z),z); t?ctx.lineTo(p.X,p.Y):ctx.moveTo(p.X,p.Y);
      }
      ctx.stroke();
    }
  }
  // 1. falling terrace shards (behind)
  for(const s of shards){ if(s.a<=0) continue;
    ctx.save(); ctx.translate(s.cx,s.cy); ctx.rotate(s.rot); ctx.globalAlpha=Math.max(0,s.a);
    ctx.beginPath(); s.pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y)); ctx.closePath();
    ctx.fillStyle=hexA(s.col,0.32); ctx.fill();
    ctx.lineWidth=Math.max(1,scale*0.003); ctx.strokeStyle=hexA('--ink',0.4); ctx.stroke();
    ctx.restore();
  }
  if(!hist) return;
  ctx.globalAlpha=1;
  const {B,baselineY,centerX,binW,rH,maxStack}=hist;
  const aAxis=Math.max(0,Math.min(1,(snapProg-0.2)/0.6));
  const halfW=B*binW/2;
  // 2. axes
  ctx.globalAlpha=aAxis;
  ctx.strokeStyle=cssVar('--ink'); ctx.lineWidth=Math.max(1.5,scale*0.004);
  ctx.beginPath(); ctx.moveTo(centerX-halfW-rH, baselineY); ctx.lineTo(centerX+halfW+rH, baselineY); ctx.stroke(); // x-axis
  ctx.beginPath(); ctx.moveTo(centerX-halfW-rH, baselineY); ctx.lineTo(centerX-halfW-rH, baselineY-maxStack*2*rH-rH*2); ctx.stroke(); // y-axis
  // 3. faint smooth bell curve traced over the column envelope
  const c=(B-1)/2, sg=B/4.5;
  ctx.beginPath();
  for(let t=0;t<=B-1;t+=0.1){ const v=maxStack*Math.exp(-((t-c)*(t-c))/(2*sg*sg));
    const X=centerX+(t-c)*binW, Y=baselineY-v*2*rH; t?ctx.lineTo(X,Y):ctx.moveTo(X,Y); }
  ctx.strokeStyle=hexA('--ink',0.5); ctx.lineWidth=Math.max(1.5,scale*0.005); ctx.setLineDash([scale*0.02,scale*0.02]); ctx.stroke(); ctx.setLineDash([]);
  ctx.globalAlpha=1;
  // 4. balls fly from frozen scene position to their histogram slot
  let e=Math.max(0,Math.min(1,(snapProg-0.12)/0.85)); e=e<.5?2*e*e:1-Math.pow(-2*e+2,2)/2;
  const draws=[];
  for(const b of ideas){ if(!b.shown||b.hx===undefined) continue;
    draws.push({X:b.sx+(b.hx-b.sx)*e, Y:b.sy+(b.hy-b.sy)*e, r:rH, fill:'--idea'}); }
  for(const b of labBalls){ if(b.hx===undefined) continue;
    draws.push({X:b.sx+(b.hx-b.sx)*e, Y:b.sy+(b.hy-b.sy)*e, r:rH*0.96, fill:'--labball'}); }
  draws.sort((a,b)=>a.Y-b.Y);   // higher on screen drawn first (behind)
  for(const o of draws) ballAt(o.X,o.Y,o.r,o.fill,1);
}

function drawClimb(){
  const cx=W/2, r=hx('--release'), zo=zoomOut;
  // ---- shake + big shoulder ROLL (roll flattens on zoom-out; shake stays/grows with distress) ----
  const amp=(shakeImp*14 + (1-stamina)*6 + panic*22 + crisis*28)*DPR;
  ctx.save();
  ctx.translate(cx,H/2); ctx.rotate(roll*(1-zo)); ctx.translate(-cx,-H/2);
  ctx.translate((Math.random()-0.5)*amp,(Math.random()-0.5)*amp);

  if(climbCols){
    const {B,counts,colors,add,pile,green}=climbCols;
    const colPx=lerp(W*0.22,(W*0.86)/B,zo);     // POV: few wide columns -> overview: all columns
    const D=colPx*0.42;
    const footY=lerp(H*0.72,H*0.84,zo);          // overview baseline sits near the bottom
    const camX=lerp(climbProgC,(B-1)/2,zo);      // pan from the left flank to centre
    const ic=x=>{const i=Math.floor(x),f=x-i,a=counts[Math.max(0,Math.min(B-1,i))],b=counts[Math.max(0,Math.min(B-1,i+1))];return a+(b-a)*f;};
    const camY=ic(climbProgC)*D*(1-zo);          // zoom out drops the camera to the baseline
    ctx.fillStyle=hexA('--hidden',0.07); ctx.fillRect(-W,footY-camY,3*W,H*2);
    if(zo>0.02){ ctx.strokeStyle=hexA('--ink',0.45*zo); ctx.lineWidth=Math.max(1,scale*0.003); // baseline appears on zoom-out
      ctx.beginPath(); ctx.moveTo(0,footY+camY); ctx.lineTo(W,footY+camY); ctx.stroke(); }
    const list=[];
    for(let b=0;b<B;b++){
      const X=cx+(b-camX)*colPx, stack=colors[b];
      for(let s=0;s<stack.length;s++) list.push({X,Y:footY-((s+0.5)*D-camY),r:D*0.5,fill:stack[s],key:b});
    }
    // additive orange balls piling onto the right flank (revealed by pileProg)
    if(pile && pileProg>0){
      const rev=pileProg*pile.length;
      for(let i=0;i<pile.length;i++){ const show=rev-i; if(show<=0) break;
        const pb=pile[i], X=cx+(pb.b-camX)*colPx; let Y=footY-((counts[pb.b]+pb.s+0.5)*D-camY);
        if(show<1.8) Y-=(1.8-show)/1.8*(H*0.55);   // the few most recent visibly fall from high up
        list.push({X,Y,r:D*0.48,fill:'--labball',key:pb.b}); }
    }
    // green code-review balls (peer's single ball, then the 2,000-line flood)
    if(green && greenShown>0){
      for(let i=0;i<green.length;i++){ const show=greenShown-i; if(show<=0) break;
        const gb=green[i], X=cx+(gb.b-camX)*colPx; let Y=footY-((gb.lvl+0.5)*D-camY);
        if(show<1.8) Y-=(1.8-show)/1.8*(H*0.6);
        list.push({X,Y,r:D*0.47,fill:'--idea',key:gb.b+0.3}); }
    }
    list.sort((a,b)=>b.key-a.key);
    for(const o of list) ballAt(o.X,o.Y,o.r,o.fill,1);
    // summit marker fades out as we zoom out
    if(zo<0.6){ const pkX=cx+(climbMode-camX)*colPx, pkY=footY-((counts[climbMode])*D-camY);
      ctx.fillStyle=hexA('--open',0.85*(1-zo)); ctx.beginPath(); ctx.arc(pkX,pkY-D*0.5,Math.max(3,scale*0.012),0,Math.PI*2); ctx.fill(); }
  }
  ctx.restore(); // end shake + roll

  // HUD: stamina bar (distress stays through zoom-out; hidden only on the internal-dialogue screen)
  if(dlg!=='devast'){ const bw=W*0.4, bh=14*DPR, bx=cx-bw/2, by=dlg?H*0.045:H*0.9;
    ctx.fillStyle=hexA('--ink',0.16); ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle=rgba(mix(hx('--release'),hx('--open'),stamina),0.95); ctx.fillRect(bx,by,bw*Math.max(0,stamina),bh);
    ctx.strokeStyle=hexA('--ink',0.5); ctx.lineWidth=Math.max(1,scale*0.003); ctx.strokeRect(bx,by,bw,bh); }

  // wounded red vignette, pulsing — stays through the crisis, then fades as the breathing clears
  const pulse=0.5+0.5*Math.sin(frameCount*(0.12+panic*0.20));
  const woundA=Math.min(0.82, Math.max(wound,panic)*(0.22+0.34*pulse)+panic*0.16)*(1-clearProg);
  if(woundA>0.01){ const g=ctx.createRadialGradient(cx,H/2,Math.min(W,H)*(0.18-panic*0.1),cx,H/2,Math.max(W,H)*0.62);
    g.addColorStop(0,`rgba(${r.r},${r.g},${r.b},0)`); g.addColorStop(1,`rgba(${r.r},${r.g},${r.b},${woundA})`);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }
  if(flash>0.01){ ctx.fillStyle=`rgba(${r.r},${r.g},${r.b},${flash*0.5})`; ctx.fillRect(0,0,W,H); }
  // crisis: the signal shatters — cracks spread first (glassK), static fills the panes later (crisis)
  if(glassK>0.01 || crisis>0.01) drawGlass(glassK, crisis);
  if(glassFall.length) drawGlassFall();
  // breathing: a pulsing radius clears the frozen static into calm white, paced by each breath
  if(clearProg>0.001){
    const R=Math.hypot(W,H), cr=(clearProg*0.62 + breathPulse*0.06)*R;
    const wg=ctx.createRadialGradient(cx,H/2,Math.max(1,cr*0.7),cx,H/2,Math.max(2,cr));
    wg.addColorStop(0,'rgba(248,246,240,1)'); wg.addColorStop(1,'rgba(248,246,240,0)');
    ctx.fillStyle=wg; ctx.fillRect(0,0,W,H);
    ctx.strokeStyle=`rgba(255,255,255,${0.25*(1-clearProg)})`; ctx.lineWidth=Math.max(1,scale*0.004);
    ctx.beginPath(); ctx.arc(cx,H/2,cr,0,Math.PI*2); ctx.stroke();
  }
  if(dlg==='breathe') drawBreathPacer();

  if(climbIntro<0.999){ ctx.fillStyle=`rgba(243,234,216,${1-climbIntro})`; ctx.fillRect(0,0,W,H); }
}

function drawStatCard(upTo, a){
  const cx=W/2, mono="'Spline Sans Mono',monospace";
  const cardW=Math.min(W*0.62, 560*DPR), cardX=cx-cardW/2, cardY=H*0.10;
  const rowH=Math.max(26*DPR, scale*0.05), pad=14*DPR, cardH=pad*2+rowH*(REVIEW.length+1);
  ctx.globalAlpha=a;
  ctx.fillStyle=hexA('--paper',0.9); ctx.fillRect(cardX,cardY,cardW,cardH);
  ctx.strokeStyle=cssVar('--ink'); ctx.lineWidth=Math.max(2,scale*0.005); ctx.strokeRect(cardX,cardY,cardW,cardH);
  ctx.strokeRect(cardX+4*DPR,cardY+4*DPR,cardW-8*DPR,cardH-8*DPR);
  ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillStyle=cssVar('--ink'); ctx.font=`900 ${Math.round(rowH*0.5)}px 'Fraunces',serif`;
  ctx.fillText('PERFORMANCE REVIEW', cardX+pad, cardY+pad+rowH*0.5);
  for(let i=0;i<REVIEW.length;i++){
    if(upTo<i) continue;
    const ry=cardY+pad+rowH*(i+1)+rowH*0.5, R=REVIEW[i];
    const isPanic=!!R.panic, pulse=0.5+0.5*Math.sin(frameCount*0.18);
    if(isPanic){ ctx.fillStyle=rgba(hx('--release'),(0.14+0.18*pulse)*a); ctx.fillRect(cardX+6*DPR,ry-rowH*0.5,cardW-12*DPR,rowH); }
    const col=isPanic?cssVar('--release'):cssVar('--ink');
    ctx.fillStyle=col; ctx.font=`500 ${Math.round(rowH*0.42)}px ${mono}`;
    ctx.textAlign='left'; ctx.fillText(R.cat, cardX+pad, ry);
    const pipS=rowH*0.42, pipGap=pipS*0.4, pipsW=5*pipS+4*pipGap, pipX=cardX+cardW-pad-pipsW-70*DPR;
    for(let p=0;p<5;p++){ const fx=pipX+p*(pipS+pipGap), full=R.pips-p;
      ctx.strokeStyle=col; ctx.lineWidth=Math.max(1,scale*0.003); ctx.strokeRect(fx,ry-pipS/2,pipS,pipS);
      if(full>=1){ ctx.fillStyle=col; ctx.fillRect(fx,ry-pipS/2,pipS,pipS); }
      else if(full>=0.5){ ctx.fillStyle=col; ctx.fillRect(fx,ry-pipS/2,pipS/2,pipS); } }
    ctx.textAlign='right'; ctx.font=`700 ${Math.round(rowH*0.44)}px ${mono}`;
    ctx.fillText(R.score+' / 5', cardX+cardW-pad, ry);
  }
  ctx.globalAlpha=1;
}
function drawDialogBox(matrix,name,text,shown,done,slide,nameCol){
  const m=22*DPR, mono="'Spline Sans Mono',monospace";
  const boxH=H*0.24, boxX=m, boxW=W-2*m, boxY=H-boxH-m + slide*(boxH+m*2);

  ctx.fillStyle=hexA('--paper',0.97); ctx.fillRect(boxX,boxY,boxW,boxH);
  ctx.strokeStyle=cssVar('--ink'); ctx.lineWidth=Math.max(2,scale*0.006); ctx.strokeRect(boxX,boxY,boxW,boxH);
  ctx.strokeRect(boxX+5*DPR,boxY+5*DPR,boxW-10*DPR,boxH-10*DPR);
  const pInset=16*DPR; let tX=boxX+pInset+10*DPR;
  if(matrix){ const pSize=boxH-2*pInset, pX=boxX+pInset, pY=boxY+pInset;
    ctx.fillStyle=hexA('--unknown',0.16); ctx.fillRect(pX,pY,pSize,pSize);
    ctx.strokeStyle=cssVar('--ink'); ctx.lineWidth=Math.max(1,scale*0.004); ctx.strokeRect(pX,pY,pSize,pSize);
    const s=Math.floor(pSize/(matrix.length+1)); drawPixelArt(matrix, pX+(pSize-16*s)/2, pY+(pSize-matrix.length*s)/2, s);
    tX=pX+pSize+22*DPR; }
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillStyle=nameCol||cssVar('--ink'); ctx.font=`900 ${Math.round(boxH*0.13)}px 'Fraunces',serif`;
  ctx.fillText(name, tX, boxY+pInset+boxH*0.12);
  const str=text.slice(0,Math.floor(shown));
  ctx.font=`500 ${Math.round(boxH*0.135)}px ${mono}`; ctx.fillStyle=cssVar('--ink');
  const maxW=boxX+boxW-tX-pInset, lh=boxH*0.20; let line='', yy=boxY+pInset+boxH*0.34;
  for(const word of str.split(' ')){
    if(ctx.measureText(line+word+' ').width>maxW && line){ ctx.fillText(line,tX,yy); line=word+' '; yy+=lh; }
    else line+=word+' ';
  }
  ctx.fillText(line,tX,yy);
  if(done && Math.floor(frameCount/22)%2===0){ ctx.fillStyle=cssVar('--ink'); ctx.textAlign='right';
    ctx.font=`700 ${Math.round(boxH*0.16)}px ${mono}`; ctx.fillText('▼', boxX+boxW-pInset, boxY+boxH-pInset); }
}
function drawDevast(){
  const mono="'Spline Sans Mono',monospace";
  // looping "2.5 / 5" ghost that won't leave — faint, drifting, pulsing (behind everything)
  ctx.save(); ctx.textAlign='center'; ctx.textBaseline='middle';
  for(let i=0;i<10;i++){
    const gx=((i*173+ frameCount*0.6)%(W+200))-100, gy=H*0.14+((i*131)%Math.floor(H*0.42));
    const ga=0.06+0.05*Math.sin(frameCount*0.05+i);
    ctx.fillStyle=rgba(hx('--release'),ga); ctx.font=`700 ${Math.round(scale*0.06)}px ${mono}`;
    ctx.fillText('2.5 / 5', gx, gy);
  }

  if(mgrExit<0.999) drawDialogBox(BOSS,'ENGINEERING MANAGER','',0,false,mgrExit);
  // once he's gone, the mask drops: a thought-bubble with the devastated face + the rumination
  const ba=Math.max(0,Math.min(1,(mgrExit-0.35)/0.55));
  if(ba>0.01) drawThoughtBubble(ICSAD,RUMINATE,streamC,streamDone,ba);
}
function drawThoughtBubble(matrix,text,shown,done,a){
  const m=22*DPR, mono="'Spline Sans Mono',monospace";
  const boxH=H*0.25, boxX=m, boxW=W-2*m, boxY=H-boxH-m, rad=boxH*0.28;
  ctx.save(); ctx.globalAlpha=a;
  // trailing thought bubbles rising from the top-left (the "thought" tail)
  ctx.fillStyle=hexA('--paper',0.97); ctx.strokeStyle=cssVar('--ink'); ctx.lineWidth=Math.max(2,scale*0.004);
  [[boxX+boxW*0.16, boxY-26*DPR, 18*DPR],[boxX+boxW*0.11, boxY-58*DPR, 12*DPR],[boxX+boxW*0.07, boxY-84*DPR, 7*DPR]]
    .forEach(([bx,by,br])=>{ ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fill(); ctx.stroke(); });
  // cloud body (rounded) with a soft double border
  ctx.fillStyle=hexA('--ink',0.22); rr(boxX+6*DPR,boxY+6*DPR,boxW,boxH,rad); ctx.fill();   // drop shadow
  ctx.fillStyle=hexA('--paper',0.98); rr(boxX,boxY,boxW,boxH,rad); ctx.fill();
  ctx.strokeStyle=cssVar('--ink'); ctx.lineWidth=Math.max(2,scale*0.006); rr(boxX,boxY,boxW,boxH,rad); ctx.stroke();
  rr(boxX+6*DPR,boxY+6*DPR,boxW-12*DPR,boxH-12*DPR,rad*0.8); ctx.lineWidth=Math.max(1,scale*0.003); ctx.stroke();
  // devastated portrait
  const pInset=20*DPR, pSize=boxH-2*pInset, pX=boxX+pInset+8*DPR, pY=boxY+pInset;
  ctx.fillStyle=hexA('--unknown',0.16); ctx.fillRect(pX,pY,pSize,pSize);
  ctx.strokeStyle=cssVar('--ink'); ctx.lineWidth=Math.max(1,scale*0.004); ctx.strokeRect(pX,pY,pSize,pSize);
  const s=Math.floor(pSize/(matrix.length+1)); drawPixelArt(matrix, pX+(pSize-16*s)/2, pY+(pSize-matrix.length*s)/2, s);
  // italic monologue (internal voice)
  const tX=pX+pSize+24*DPR, str=text.slice(0,Math.floor(shown));
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillStyle=cssVar('--ink'); ctx.font=`italic 600 ${Math.round(boxH*0.14)}px 'Fraunces',serif`;
  const maxW=boxX+boxW-tX-pInset, lh=boxH*0.20; let line='', yy=boxY+pInset+boxH*0.22;
  for(const word of str.split(' ')){
    if(ctx.measureText(line+word+' ').width>maxW && line){ ctx.fillText(line,tX,yy); line=word+' '; yy+=lh; }
    else line+=word+' ';
  }
  ctx.fillText(line,tX,yy);
  if(done && Math.floor(frameCount/22)%2===0){ ctx.fillStyle=cssVar('--ink'); ctx.textAlign='right';
    ctx.font=`700 ${Math.round(boxH*0.15)}px ${mono}`; ctx.fillText('▼', boxX+boxW-pInset, boxY+boxH-pInset); }
  ctx.restore();
}
function drawDlg(){
  if(dlg==='review'){ drawStatCard(reviewPhase===0?3:4,1); if(confetti.length) drawConfetti(); drawDialogBox(BOSS,'ENGINEERING MANAGER',curText(),streamC,streamDone,0); }
  else if(dlg==='reply'){ drawStatCard(REVIEW.length-1,1); drawDialogBox(ICME,'YOU',curText(),streamC,streamDone,0); }
  else if(dlg==='exit'){ drawStatCard(REVIEW.length-1,1-boxSlide); drawDialogBox(BOSS,'ENGINEERING MANAGER','',0,false,boxSlide); }
  else if(dlg==='devast'){ drawDevast(); }
  else if(dlg==='news'){ drawDialogBox(null,'BREAKING',curText(),streamC,streamDone,0,cssVar('--release')); }
  else if(dlg==='peer'){ drawDialogBox(PEER,'PEER',curText(),streamC,streamDone,0,cssVar('--idea')); }
  else if(dlg==='troll'){ drawDialogBox(TROLL,'PEER',curText(),streamC,streamDone,0,cssVar('--release')); }
  else if(dlg==='breath'){ const stopped=staticMotion<0.1;
    const txt = stopped ? 'breath' : '.'.repeat(Math.min(3, Math.floor((1-staticMotion)*4)));
    drawDialogBox(SHADOW,'...',txt,txt.length,stopped,0,cssVar('--ink-soft')); }
  else if(dlg==='breathe'){ drawDialogBox(SHADOW,'...',breathLabel,breathLabel.length,true,0,cssVar('--ink-soft')); }
}
function fadeOverlay(){ if(fadeK>0.001){ ctx.fillStyle=`rgba(0,0,0,${Math.min(1,fadeK)})`; ctx.fillRect(0,0,W,H);} }

function frame(){physics();draw();requestAnimationFrame(frame);}

// ===== beats =====
function resetLoad(){ for(const k in cellMass){cellMass[k]=0; amp[k]=0; fill[k]=0;} }
function clearCounts(){ for(const b of ideas) b.counted=false; for(const b of labBalls) b.counted=false; }
function showBall(idx,toArena,stagger){ const b=ideas[idx];
  if(!b.shown){ b.shown=true; b.delay=stagger||0; }   // fresh stagger only on first reveal
  if(toArena){const s=arenaSlot(idx); b.tx=s.x; b.tz=s.z;} }
function showUpTo(n){ for(let i=0;i<6;i++){ if(i<n) showBall(i,true,(i>=2?(i-2)*14:0)); else { ideas[i].shown=false; ideas[i].delay=0; } } }
function setCells(u,b,o,h){cellAlphaT.unknown=u;cellAlphaT.blind=b;cellAlphaT.open=o;cellAlphaT.hidden=h;}
const ctrlEl=document.querySelector('.controls');
function showControls(v){ if(ctrlEl) ctrlEl.style.visibility=v?'visible':'hidden'; }
const BEATS=[
  // ---- intro: build the window from nothing ----
  {name:'black',   do(){pitchTarget=0; bgT=0; unkMixT=0; axisT=0; setCells(0,0,0,0); showControls(false);
                        refog(); releases.length=0; labBalls.length=0; stopLab(); releaseWell.unknown=0; resetLoad(); makeIdeas(); showUpTo(0);
                        climbCols=null; pileProg=0; pileT=0; zoomOut=0; zoomT=0; fadeK=0; fadeKT=0; crisis=0; crisisT=0; mgrExit=0; mgrExitT=0; glass=[]; glassK=0; glassKT=0; glassFall=[]; greenShown=0; greenShownT=0; staticMotion=1; staticMotionT=1; staticAcc=0; clearProg=0; clearProgT=0; breathT=0; breathPhase=''; breathLabel=''; breathPulse=0; breathLocal=0; pacerA=1; pacerAT=1; whiteEnd=false; reviewPhase=0; confetti=[]; panic=0; panicT=0; flash=0; wound=0;}},
  {name:'unknown', do(){pitchTarget=0; bgT=1; unkMixT=0; axisT=0; setCells(1,0,0,0); showControls(true);}},
  {name:'+ blind', do(){pitchTarget=0; bgT=1; unkMixT=1; axisT=1; setCells(1,1,0,0);}},
  {name:'+ open',  do(){pitchTarget=0; bgT=1; unkMixT=1; axisT=1; setCells(1,1,1,0);}},
  {name:'+ hidden',do(){pitchTarget=0; bgT=1; unkMixT=1; axisT=1; setCells(1,1,1,1);}},
  // ---- the window is whole; tilt into the terrace ----
  {name:'reveal',     do(){pitchTarget=1; stopLab(); showUpTo(0);}},
  {name:'first idea', do(){pitchTarget=1; stopLab(); labBalls.length=0; showUpTo(1);}},
  {name:'second idea',do(){pitchTarget=1; stopLab(); labBalls.length=0; showUpTo(2);}},
  {name:'the rest',   do(){pitchTarget=1; stopLab(); labBalls.length=0; showUpTo(6);}},
  {name:'labs flood', do(){pitchTarget=1; showUpTo(6); startLab();}},
  {name:'snap',       do(){pitchTarget=1; showUpTo(6); floodFill(); snapping=true; snapProg=0; buildShards(); buildHistogram();}},
  {name:'climb',      do(){showUpTo(6); floodFill(); climbing=true; climbStep=0; climbProgC=0; stamina=1; wound=0; shakeImp=0; climbIntro=0; roll=0; rollTarget=0; buildClimb();}},
  {name:'review',     do(){ if(!climbCols){ showUpTo(6); floodFill(); buildClimb(); }
                        climbing=true; dlg='review'; reviewIdx=0; reviewPhase=0; streamC=0; streamDone=false; panic=0; panicT=0; flash=0;
                        confetti=[]; fireConfetti();
                        climbStep=CLIMB_MAX; climbProgC=CLIMB_MAX; stamina=0.12; wound=1; roll=0; rollTarget=0; climbIntro=1; }},
  {name:'reply',      do(){ climbing=true; dlg='reply'; streamC=0; streamDone=false; panicT=1;
                        climbStep=CLIMB_MAX; climbProgC=CLIMB_MAX; stamina=0.12; wound=1; climbIntro=1; boxSlide=0; }},
  {name:'devast',     do(){ climbing=true; dlg='devast'; streamC=0; streamDone=false; panicT=1; mgrExit=0; mgrExitT=1;
                        climbStep=CLIMB_MAX; climbProgC=CLIMB_MAX; stamina=0.12; wound=1; climbIntro=1; }},
  {name:'breaking',   do(){ climbing=true; dlg='news'; streamC=0; streamDone=false; panicT=1; pileT=0; zoomT=1; crisisT=0; rollTarget=0;  // the one zoom-out; bell fills high
                        climbStep=CLIMB_MAX; climbProgC=CLIMB_MAX; stamina=0.12; wound=1; climbIntro=1; if(!climbCols){ showUpTo(6); floodFill(); buildClimb(); } }},
  {name:'fill',       do(){ climbing=true; dlg='news'; panicT=1; pileT=1; zoomT=1; crisisT=0; glassKT=0; greenShownT=0;  // orange balls fill the right edge (exponential)
                        climbStep=CLIMB_MAX; climbProgC=CLIMB_MAX; stamina=0.12; wound=1; climbIntro=1; }},
  {name:'glass',      do(){ climbing=true; dlg='news'; panicT=1; pileT=1; zoomT=1; glassKT=1; crisisT=0; greenShownT=0;  // the glass cracks — red still pulsing, no static yet
                        climbStep=CLIMB_MAX; climbProgC=CLIMB_MAX; stamina=0.12; wound=1; climbIntro=1; }},
  {name:'peer',       do(){ climbing=true; dlg='peer'; streamC=0; streamDone=false; panicT=1; pileT=1; zoomT=1; glassKT=1; crisisT=0; greenShownT=1;  // a peer drops one green ball, casual ask
                        climbStep=CLIMB_MAX; climbProgC=CLIMB_MAX; stamina=0.12; wound=1; climbIntro=1; }},
  {name:'troll',      do(){ climbing=true; dlg='troll'; streamC=0; streamDone=false; panicT=1; pileT=1; zoomT=1; glassKT=1; crisisT=1; greenShownT=99;  // troll reveal + 2,000-line flood -> static fills the cracks
                        spawnGlassFall(14);
                        climbStep=CLIMB_MAX; climbProgC=CLIMB_MAX; stamina=0.12; wound=1; climbIntro=1; }},
  {name:'static',     do(){ climbing=true; dlg=''; panicT=1; pileT=1; zoomT=1; glassKT=1; crisisT=1; greenShownT=99; staticMotionT=1;  // just static — full field, red still pulsing
                        spawnGlassFall(8);
                        climbStep=CLIMB_MAX; climbProgC=CLIMB_MAX; stamina=0.12; wound=1; climbIntro=1; }},
  {name:'breath',     do(){ climbing=true; dlg='breath'; panicT=1; pileT=1; zoomT=1; glassKT=1; crisisT=1; greenShownT=99; staticMotionT=0;  // static slows to a stop; "..." -> the word breath
                        climbStep=CLIMB_MAX; climbProgC=CLIMB_MAX; stamina=0.12; wound=1; climbIntro=1; }},
  {name:'breathe',    do(){ climbing=true; dlg='breathe'; panicT=0; pileT=1; zoomT=1; glassKT=1; crisisT=1; greenShownT=99;  // timed grounding exercise; breaths clear the static to white
                        staticMotion=0; staticMotionT=0; breathT=0; breathPhase=''; clearProg=0; clearProgT=0; pacerA=1; pacerAT=1;
                        climbStep=CLIMB_MAX; climbProgC=CLIMB_MAX; stamina=0.12; wound=1; climbIntro=1; }},
  {name:'white',      do(){ climbing=false; dlg=''; whiteEnd=true; showControls(false); }}   // final: pure white, no controls
];
let beat=0;
const KEEPCLIMB=['climb','review','reply','devast','breaking','fill','glass','peer','troll','static','breath','breathe'];
const dotsEl=document.getElementById('dots');
BEATS.forEach(()=>{const i=document.createElement('i'); dotsEl.appendChild(i);});
function applyBeat(i){beat=(i+BEATS.length)%BEATS.length;
  const nm=BEATS[beat].name;
  // defaults for the post-intro beats: full window present, paper bg, coloured unknown, controls shown
  bgT=1; unkMixT=1; axisT=0; setCells(1,1,1,1); showControls(true); whiteEnd=false;
  if(nm!=='snap'){ snapping=false; snapProg=0; shards.length=0; hist=null; }
  if(!KEEPCLIMB.includes(nm)){ climbing=false; }
  dlg=''; boxSlideT=0;                                  // dialogue beats set their own mode
  if(!['fill','glass','peer','troll','static','breath','breathe'].includes(nm)){ pileT=0; }
  if(!['breaking','fill','glass','peer','troll','static','breath','breathe'].includes(nm)){ zoomT=0; }
  if(!['glass','peer','troll','static','breath','breathe'].includes(nm)){ glassKT=0; }
  if(!['peer','troll','static','breath','breathe'].includes(nm)){ greenShownT=0; }
  if(!['troll','static','breath','breathe'].includes(nm)){ crisisT=0; }
  if(nm!=='breath' && nm!=='breathe'){ staticMotionT=1; }
  if(nm!=='breathe'){ clearProgT=0; clearProg=0; breathT=0; breathPhase=''; }
  BEATS[beat].do();
  [...dotsEl.children].forEach((d,n)=>d.classList.toggle('on',n===beat));}
// each advance inside climb = a step; inside a dialogue = the next line / completion; otherwise = next beat
function advance(){
  const nm=BEATS[beat].name;
  if(nm==='climb' && climbStep<CLIMB_MAX){ climbStep++; onClimbStep(); return; }
  if(nm==='review'){
    if(!streamDone){ streamC=curText().length; streamDone=true; return; }
    if(reviewPhase===0){ reviewPhase=1; streamC=0; streamDone=false; confetti=[]; panicT=1; flash=1; shakeImp=1; return; }
  }
  if((nm==='reply'||nm==='devast'||nm==='breaking'||nm==='peer'||nm==='troll') && !streamDone){ streamC=curText().length; streamDone=true; return; }
  applyBeat(beat+1);
}

// ===== controls =====
function screenToFloor(sx,sy){ // exact only near iso; fine for free play at pitch~1
  const X=(sx-ox)/scale, Y=(sy-oy)/scale;
  const c=Math.cos(ISO), s=Math.sin(ISO);
  // invert iso (y=0): X=(x-z)c, Y=(x+z)s  -> x=(X/c+Y/s)/2, z=(Y/s-X/c)/2
  const x=(X/c + Y/s)/2, z=(Y/s - X/c)/2; return {x,z};
}
let freeplay=false;
function setup(){layout();ballR=GRID*0.07;initFog();makeIdeas();applyBeat(0);}
setup();requestAnimationFrame(frame);
addEventListener('resize',()=>layout());
document.getElementById('next').onclick=()=>advance();
document.getElementById('back').onclick=()=>applyBeat(beat-1);
document.getElementById('restart').onclick=()=>{initFog();applyBeat(0);};
const fpBtn=document.getElementById('freeplay');
fpBtn.onclick=()=>{freeplay=!freeplay;fpBtn.classList.toggle('on',freeplay);};
const tipEl=document.getElementById('tip');
document.getElementById('help').onclick=()=>{tipEl.hidden=!tipEl.hidden;};
function cellKeyAt(x,z){for(const k in CELLS){const c=CELLS[k];if(x>=c.minx&&x<c.maxx&&z>=c.minz&&z<c.maxz)return k;}return null;}
let pressTimer=null, pressKey=null, longPressing=false;
const LONG_MS=350;
cv.addEventListener('pointerdown',e=>{
  if(!freeplay)return;
  const {x,z}=screenToFloor(e.clientX*DPR,e.clientY*DPR);
  pressKey=cellKeyAt(x,z); longPressing=false;
  if(!pressKey)return;
  pressTimer=setTimeout(()=>{ longPressing=true; liftTarget[pressKey]=LIFT_MAX; }, LONG_MS); // hold = lift the plane
});
function endPress(){
  if(pressTimer){clearTimeout(pressTimer);pressTimer=null;}
  if(longPressing && pressKey){ liftTarget[pressKey]=0; }            // release -> settle back down
  else if(pressKey){                                                 // short click -> drop a weighted ball
    const c=CELLS[pressKey], cx=(c.minx+c.maxx)/2, cz=(c.minz+c.maxz)/2;
    labBalls.push({x:cx+(Math.random()-0.5)*0.5,z:cz+(Math.random()-0.5)*0.5,tx:cx+(Math.random()-0.5)*0.6,tz:cz+(Math.random()-0.5)*0.6,stack:0,counted:false});
  }
  pressKey=null; longPressing=false;
}
addEventListener('pointerup',endPress);
addEventListener('pointercancel',endPress);
addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='ArrowRight'){e.preventDefault();advance();}
  else if(e.key==='ArrowLeft'){applyBeat(beat-1);}
  else if(e.key==='Home'){initFog();applyBeat(0);}
  else if(e.key==='f'){fpBtn.click();}
});
</script>
